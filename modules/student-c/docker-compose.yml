version: '3.8'

# =============================================================
# SDA-Pro Student C - SOC Platform
# Docker Compose: PostgreSQL + Redis + RabbitMQ + App
# Student C: SOC Platform Engineer
# =============================================================

services:

  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: sda-studentc-postgres
    environment:
      POSTGRES_DB: sdapro
      POSTGRES_USER: sdauser
      POSTGRES_PASSWORD: sdapassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdauser -d sdapro"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sda-network

  # ── Redis Cache ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sda-studentc-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sda-network

  # ── RabbitMQ Event Bus ──────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: sda-studentc-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - sda-network

  # ── Spring Boot Application ─────────────────────────────────
  sda-pro-studentc:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sda-studentc-app
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sdapro
      SPRING_DATASOURCE_USERNAME: sdauser
      SPRING_DATASOURCE_PASSWORD: sdapassword
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - sda-network
    restart: on-failure

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  sda-network:
    driver: bridge
