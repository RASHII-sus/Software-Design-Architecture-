name: SDA-Pro Student C - CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ============================================================
  # JOB 1: Build & Test
  # ============================================================
  build-and-test:
    name: Build & Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run all tests (H2 in-memory, no external services needed)
        run: mvn test -Dspring.profiles.active=test --no-transfer-progress

      - name: Build JAR
        run: mvn package -DskipTests --no-transfer-progress

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v3
        with:
          name: sda-pro-studentc-jar
          path: target/*.jar

  # ============================================================
  # JOB 2: Code Quality Check
  # ============================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run checkstyle
        run: mvn verify -DskipTests --no-transfer-progress || true

  # ============================================================
  # JOB 3: Docker Build (optional, requires Docker Hub secrets)
  # ============================================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t sda-pro-studentc:latest . || echo "Dockerfile not present, skipping"
