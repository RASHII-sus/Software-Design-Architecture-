# =============================================
# SDA-Pro Student C - Application Configuration
# SOC Platform Engineer
# =============================================

# Server
server.port=8084
spring.application.name=sda-pro-studentc

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://localhost:5432/sdapro
spring.datasource.username=sdauser
spring.datasource.password=sdapassword
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis Cache
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.cache.type=redis
spring.cache.redis.time-to-live=300000

# RabbitMQ Event Bus
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.virtual-host=/

# RabbitMQ Queue Names (Event Bus)
rabbitmq.queue.alert=sda.alert.queue
rabbitmq.queue.incident=sda.incident.queue
rabbitmq.queue.notification=sda.notification.queue
rabbitmq.exchange=sda.exchange
rabbitmq.routing.alert=alert.routing.key
rabbitmq.routing.incident=incident.routing.key
rabbitmq.routing.notification=notification.routing.key

# JWT Security
app.jwt.secret=SdaProSecretKey2024StudentCSOCPlatformEngineerJwtTokenSigningKey
app.jwt.expiration=86400000

# Logging
logging.level.com.sdapro=DEBUG
logging.level.org.springframework.security=INFO

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
