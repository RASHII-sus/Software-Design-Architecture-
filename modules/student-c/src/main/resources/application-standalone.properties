# Standalone profile - runs without PostgreSQL, Redis, or RabbitMQ
# Uses H2 in-memory database and simple cache

# H2 Database (no PostgreSQL needed)
spring.datasource.url=jdbc:h2:mem:sdapro;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Disable Redis - use simple in-memory cache
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

spring.cache.type=simple

# JWT Security (same as production)
app.jwt.secret=SdaProSecretKey2024StudentCSOCPlatformEngineerJwtTokenSigningKey
app.jwt.expiration=86400000

# Logging
logging.level.com.sdapro=INFO

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
