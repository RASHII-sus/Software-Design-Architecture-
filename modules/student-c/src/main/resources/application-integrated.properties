# Integrated profile - runs Student C connecting to Student B's shared infrastructure

# PostgreSQL Database (matching Student B's docker-compose credentials)
spring.datasource.url=jdbc:postgresql://localhost:5432/sdapro
spring.datasource.username=sdapro
spring.datasource.password=sdapro_secret
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis Cache (matching Student B's Redis password)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=redis_secret
spring.data.redis.timeout=2000ms
spring.cache.type=redis
spring.cache.redis.time-to-live=300000

# RabbitMQ Event Bus (matching Student B's RabbitMQ credentials and virtual host)
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=sdapro
spring.rabbitmq.password=rabbitmq_secret
spring.rabbitmq.virtual-host=sdapro

# RabbitMQ Queue Names (Event Bus)
rabbitmq.queue.alert=sda.alert.queue
rabbitmq.queue.incident=sda.incident.queue
rabbitmq.queue.notification=sda.notification.queue
rabbitmq.exchange=sda.exchange
rabbitmq.routing.alert=alert.routing.key
rabbitmq.routing.incident=incident.routing.key
rabbitmq.routing.notification=notification.routing.key

# JWT Security
app.jwt.secret=SdaProSecretKey2024StudentCSOCPlatformEngineerJwtTokenSigningKey
app.jwt.expiration=86400000

# Logging
logging.level.com.sdapro=DEBUG
logging.level.org.springframework.security=INFO

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
